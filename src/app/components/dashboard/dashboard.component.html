<div class="container mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6 text-center">AIFlash Generator</h1>

  <div class="max-w-2xl mx-auto mb-10">
    <textarea 
      [(ngModel)]="userNotes" 
      class="w-full p-4 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500"
      rows="6" 
      placeholder="Paste your lecture notes here...">
    </textarea>
    
    <button 
      (click)="onGenerate()"
      [disabled]="isLoading || !userNotes"
      class="mt-4 w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 disabled:opacity-50">
      {{ isLoading ? 'Generating with AI...' : 'Generate Flashcards' }}
    </button>
  </div>

  <div *ngIf="isLoading" class="flex justify-center my-10">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div *ngFor="let card of flashcards" 
         (click)="toggleCard(card)"
         class="cursor-pointer h-48 w-full perspective">
      
      <div class="relative w-full h-full transition-all duration-500 preserve-3d"
           [class.rotate-y-180]="card.isFlipped">
        
        <div class="absolute inset-0 bg-white border-2 border-blue-100 rounded-xl p-6 flex flex-col items-center justify-center text-center backface-hidden shadow-md">
          <span class="text-xs font-bold text-blue-500 uppercase mb-2">{{ card.category }}</span>
          <p class="text-lg font-medium">{{ card.question }}</p>
        </div>

        <div class="absolute inset-0 bg-blue-50 border-2 border-blue-600 rounded-xl p-6 flex items-center justify-center text-center backface-hidden rotate-y-180 shadow-inner">
          <p class="text-lg text-gray-800">{{ card.answer }}</p>
        </div>

      </div>
    </div>
  </div>
</div>
